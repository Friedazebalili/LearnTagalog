<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny |  Tagalog Learning </title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        softPink: '#fff5f7',
                        petalPink: '#ffb3c1',
                        deepRose: '#ff4d6d',
                        heartPink: '#ff758f',
                        goldBorder: 'rgba(212, 175, 55, 0.2)',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Quicksand', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;600;700&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fff5f7;
            color: #594145;
            cursor: none !important;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- PINK HEART CURSOR --- */
        #cursor-main {
            position: fixed;
            top: 0;
            left: 0;
            width: 18px;
            height: 18px;
            background-color: #ff4d6d;
            transform: translate(-50%, -50%) rotate(45deg);
            pointer-events: none;
            z-index: 10001;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.4);
        }
        #cursor-main::before, #cursor-main::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background-color: #ff4d6d;
            border-radius: 50%;
        }
        #cursor-main::before { left: -9px; }
        #cursor-main::after { top: -9px; }

        #cursor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10000;
        }

        /* Disable custom cursor on mobile/touch devices for better usability */
        @media (hover: none) and (pointer: coarse) {
            body, .phrase-card, input, ul, li { cursor: auto !important; }
            #cursor-main, #cursor-canvas { display: none !important; }
        }

        /* --- ELEGANT PHRASE CARDS --- */
        .phrase-card {
            background: linear-gradient(145deg, #ffffff, #fff0f3);
            border-radius: 24px;
            aspect-ratio: 1 / 1.1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 10px 10px 25px rgba(255, 179, 193, 0.4),
                       -10px -10px 25px rgba(255, 255, 255, 0.9);
            border: 2px solid #ffffff;
        }

        @media (min-width: 768px) {
            .phrase-card {
                border-radius: 32px;
                padding: 1.5rem;
            }
        }

        .phrase-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #ffb3c1, transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .phrase-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 15px 15px 30px rgba(255, 128, 150, 0.3),
                       -12px -12px 30px rgba(255, 255, 255, 1);
        }
        
        .phrase-card:hover::after {
            opacity: 1;
        }

        /* --- MODAL POPUP --- */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 245, 247, 0.6);
            backdrop-filter: blur(12px);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-content {
            background: linear-gradient(145deg, #ffffff, #fff5f7);
            width: 100%;
            max-width: 480px;
            border-radius: 40px;
            padding: 3rem 1.5rem;
            text-align: center;
            position: relative;
            box-shadow: 20px 20px 60px rgba(255, 128, 150, 0.25),
                       -20px -20px 60px rgba(255, 255, 255, 0.9);
            border: 4px solid #ffffff;
        }

        @media (min-width: 768px) {
            .modal-content {
                border-radius: 50px;
                padding: 4rem 2rem;
            }
        }

        .btn-reveal {
            background: #ff4d6d;
            color: white;
            padding: 1rem 2rem;
            border-radius: 99px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3), inset 0 -3px 0 rgba(0,0,0,0.1);
        }

        .btn-reveal:hover {
            background: #ff758f;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 77, 109, 0.4), inset 0 -3px 0 rgba(0,0,0,0.1);
        }

        /* Animations */
        .floating {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #fff5f7; }
        ::-webkit-scrollbar-thumb { background: #ffb3c1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="cursor-main"></div>
    <canvas id="cursor-canvas"></canvas>

    <header class="pt-16 md:pt-24 pb-8 md:pb-12 text-center px-6 relative z-40">
        <div class="inline-block mb-4 md:mb-6 floating">
            <i data-lucide="sparkles" class="text-deepRose w-6 h-6"></i>
        </div>
        <h1 class="font-serif text-4xl md:text-6xl text-deepRose mb-3 italic flex justify-center items-center gap-3">
            Sinta <span class="text-2xl md:text-3xl opacity-80">🌸</span>
        </h1>
        <p class="font-sans font-medium text-petalPink tracking-[0.2em] md:tracking-[0.4em] uppercase text-[9px] md:text-[10px]">A Collection of Tagalog words for my Bunny</p>

        <div class="relative w-full max-w-md mx-auto mt-8 md:mt-10">
            <div class="relative flex items-center">
                <i data-lucide="search" class="absolute left-4 w-5 h-5 text-petalPink"></i>
                <input type="text" id="search-input" placeholder="Search a word..." 
                       class="w-full py-3 md:py-4 pl-12 pr-6 bg-white/80 backdrop-blur-sm border-2 border-white rounded-full text-gray-700 placeholder-gray-400 focus:outline-none focus:border-petalPink shadow-[5px_5px_15px_rgba(255,179,193,0.3),-5px_-5px_15px_rgba(255,255,255,0.9)] transition-all cursor-none text-sm md:text-base">
            </div>
            <ul id="search-dropdown" class="absolute w-full mt-2 bg-white/95 backdrop-blur-md border-2 border-white rounded-2xl md:rounded-3xl shadow-2xl overflow-hidden hidden max-h-48 md:max-h-60 overflow-y-auto z-50 text-left cursor-none">
                </ul>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-10 px-4 md:px-8 pb-32" id="phrase-grid">
    </main>

    <div id="modal-overlay">
        <div class="modal-content" id="modal-card">
            <div class="absolute -top-6 -left-6 text-5xl md:text-6xl rotate-[-20deg] opacity-80 floating" style="animation-delay: -1s;">🐰</div>
            
            <button id="close-modal" class="absolute top-6 right-6 text-petalPink hover:text-deepRose transition-colors z-10 p-2">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            
            <div id="modal-body" class="relative z-10">
                <span class="text-[9px] md:text-[10px] uppercase tracking-[0.4em] text-petalPink mb-4 md:mb-6 block font-bold">Tagalog Phrase</span>
                <h2 id="modal-tl" class="font-sans text-3xl md:text-5xl font-bold text-deepRose mb-3 md:mb-4 leading-tight"></h2>
                <p id="modal-p" class="text-[10px] md:text-[11px] text-gray-500 font-medium tracking-[0.2em] mb-8 md:mb-12"></p>
                
                <div id="translation-area" class="opacity-0">
                    <div class="w-12 md:w-16 h-[2px] bg-petalPink mx-auto mb-6 md:mb-10 rounded-full"></div>
                    <span class="text-[8px] md:text-[9px] uppercase tracking-[0.4em] text-gray-400 mb-3 md:mb-4 block font-bold">Meaning</span>
                    <h3 id="modal-en" class="font-sans text-xl md:text-2xl text-gray-700 font-light"></h3>
                </div>

                <div id="action-area" class="mt-8 md:mt-12">
                    <button id="reveal-btn" class="btn-reveal">Reveal Meaning</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const phrases = [
            { tl: "Mahal kita", en: "I love you", p: "/ma-hál ki-tá/" },
            { tl: "Sinta", en: "My love", p: "/sin-tá/" },
            { tl: "Miss na kita", en: "I miss you", p: "/miss na ki-tá/" },
            { tl: "Magpakailanman", en: "Forever", p: "/mag-pa-ka-i-lan-mán/" },
            { tl: "Ikaw lang", en: "Only you", p: "/i-káw lang/" },
            { tl: "Ang ganda mo", en: "You are beautiful", p: "/ang gan-dá mo/" },
            { tl: "Akin ka", en: "You are mine", p: "/a-kín ka/" },
            { tl: "Puso ko", en: "My heart", p: "/pú-so ko/" },
            { tl: "Gusto kita", en: "I like you", p: "/gus-tó ki-tá/" },
            { tl: "Ingat ka", en: "Take care", p: "/í-ngat ka/" },
            { tl: "Palagi", en: "Always", p: "/pa-la-gi/" },
            { tl: "Tadhana", en: "Destiny", p: "/tad-ha-ná/" },
            { tl: "Magandang umaga", en: "Good morning", p: "/ma-gan-dáng u-má-ga/" },
            { tl: "Salamat", en: "Thank you", p: "/sa-lá-mat/" },
            { tl: "Pasensya na", en: "I'm sorry", p: "/pa-sén-sya na/" },
            { tl: "Oo", en: "Yes", p: "/ó-o/" },
            { tl: "Hindi", en: "No", p: "/hin-dí/" },
            { tl: "Kain tayo", en: "Let's eat", p: "/ka-ín ta-yó/" },
            { tl: "Masarap", en: "Delicious", p: "/ma-sa-ráp/" },
            { tl: "Gutom ako", en: "I am hungry", p: "/gu-tóm a-kó/" },
            { tl: "Tulog na", en: "Go to sleep", p: "/tu-lóg na/" },
            { tl: "Bahay", en: "Home", p: "/bá-hay/" },
            { tl: "Uwi na tayo", en: "Let's go home", p: "/u-wí na ta-yó/" },
            { tl: "Kumusta ka?", en: "How are you?", p: "/ku-mus-tá ka/" },
            { tl: "Mabuti", en: "Good", p: "/ma-bú-ti/" },
            { tl: "Hihintayin kita", en: "I will wait for you", p: "/hi-hin-ta-yín ki-tá/" },
            { tl: "Sandali lang", en: "Just a moment", p: "/san-da-lí lang/" },
            { tl: "Dali na", en: "Hurry up", p: "/da-lí na/" },
            { tl: "Naintindihan?", en: "Do you understand?", p: "/na-in-tin-di-hán/" },
            { tl: "Tara na", en: "Let's go", p: "/ta-rá na/" },
            { tl: "Saan tayo?", en: "Where are we going?", p: "/sa-án ta-yó/" },
            { tl: "Ano ito?", en: "What is this?", p: "/a-nó i-tó/" },
            { tl: "Gabi na", en: "It's late at night", p: "/ga-bí na/" },
            { tl: "Magandang gabi", en: "Good evening", p: "/ma-gan-dáng ga-bí/" },
            { tl: "Ngiti ka", en: "Please smile", p: "/ngi-tí ka/" },
            { tl: "Pagod ako", en: "I'm tired", p: "/pa-gód a-kó/" },
            { tl: "Masaya ako", en: "I am happy", p: "/ma-sa-yá a-kó/" },
            { tl: "Iniisp kita", en: "Thinking of you", p: "/i-ni-í-sip ki-tá/" },
            { tl: "Kwento ka", en: "Tell a story", p: "/kwén-to ka/" },
            { tl: "Aalis na", en: "Leaving now", p: "/a-a-lís na/" },
            { tl: "Bukas ulit", en: "Tomorrow again", p: "/bú-kas u-lít/" },
            { tl: "Maniwala ka", en: "Believe me", p: "/ma-ni-wa-lá ka/" },
            { tl: "Walang anuman", en: "You're welcome", p: "/wa-láng a-nu-mán/" },
            { tl: "Pakiusap", en: "Please", p: "/pa-ki-ú-sap/" },
            { tl: "Sobra", en: "Soo much/Very", p: "/só-bra/" },
            { tl: "Totoo", en: "True", p: "/to-to-ó/" },
            { tl: "Kahit kailan", en: "Whenever/Ever", p: "/ká-hit kai-lán/" },
            { tl: "Paru-paro", en: "Butterfly", p: "/pa-ru-pa-ró/" },
            { tl: "Liwanag", en: "Light", p: "/li-wa-nág/" },
            { tl: "Ulan", en: "Rain", p: "/u-lán/" },
            { tl: "Bituin", en: "Star", p: "/bi-tu-ín/" },
            { tl: "Kantutin mo ako", en: "Nice to meet you", p: "/kan-to-tin mo-a-ko/" },
            { tl: "Tuwad", en: "Bend Over", p: "/too-wad/" },
            { tl: "Sarap mo", en: "Wow", p: "/sa-rap-mo/" },
            { tl: "Bili mo ako", en: "Buy me", p: "/bi-li-mo- a-ko/" },
            { tl: "Magkano?", en: "How much?", p: "/mag-ka-no /" },
            { tl: "Mahal", en: "Expensive", p: "/ma-hál/" },
            { tl: "Libre", en: "Free", p: "/li-bré/" },
            { tl: "Masarap ito", en: "This is delicious", p: "/ma-sa-ráp i-tó/" },
            { tl: "Ayoko", en: "I don't want", p: "/a-yó-ko/" },
            { tl: "Kaliwa", en: "Left", p: "/ka-li-wá/" },
            { tl: "Kanan", en: "Right", p: "/ka-nán/" },
            { tl: "Diretso", en: "Straight ahead", p: "/di-ret-só/" },
            { tl: "Malapit", en: "Near", p: "/ma-la-pít/" },
            { tl: "Malayo", en: "Far", p: "/ma-la-yó/" },
            { tl: "Bilis", en: "Fast", p: "/bi-lís/" },
            { tl: "Dahan-dahan", en: "Slowly", p: "/da-han-da-hán/" },
            { tl: "Hintay", en: "Wait", p: "/hin-táy/" },
            { tl: "Pasok", en: "Come in", p: "/pa-sók/" },
            { tl: "Labas", en: "Go out", p: "/la-bás/" },
            { tl: "Gusto ko", en: "I want", p: "/gus-tó ko/" }
        ];

        const cuteIcons = ['🐰', '🌸', '🎀', '🧸', '🌷', '💕', '✨', '🍓','🐻', '🐱', '🐶', '🐥', '🐣','💗', '💖', '💘', '💞', '💓','🌼', '🌻', '🌺', '💐','🍑', '🍒', '🍬', '🍭', '🧁', '🍰','☁️', '🌈', '⭐', '🌙','🫶', '🤍', '💌','🎈', '🎁','🩷', '💟','🐾', '🦋'];

        const grid = document.getElementById('phrase-grid');
        const overlay = document.getElementById('modal-overlay');
        const revealBtn = document.getElementById('reveal-btn');
        const translationArea = document.getElementById('translation-area');
        const searchInput = document.getElementById('search-input');
        const searchDropdown = document.getElementById('search-dropdown');

        // Render Grid Function
        function renderGrid(phrasesToRender) {
            grid.innerHTML = ''; 
            
            if (phrasesToRender.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-petalPink font-sans mt-10 tracking-widest text-sm uppercase">No words found. 🐰</div>`;
                return;
            }

            phrasesToRender.forEach((phrase) => {
                const randomIcon = cuteIcons[Math.floor(Math.random() * cuteIcons.length)];
                const el = document.createElement('div');
                // Added cursor-pointer for mobile users just in case
                el.className = 'phrase-card cursor-none md:cursor-none group cursor-pointer';
                el.innerHTML = `
                    <div class="absolute -bottom-4 -right-2 text-5xl md:text-6xl opacity-[0.06] transform -rotate-12 transition-all duration-500 ease-out 
                                group-hover:scale-110 group-hover:rotate-0 group-hover:opacity-[0.25] group-hover:-translate-y-2 group-hover:-translate-x-2 pointer-events-none">
                        ${randomIcon}
                    </div>
                    
                    <span class="text-[8px] md:text-[9px] font-bold uppercase tracking-[0.3em] text-petalPink mb-2 md:mb-3 relative z-10 transition-colors duration-300 group-hover:text-heartPink">Tagalog</span>
                    <h3 class="font-sans text-xl md:text-2xl font-bold text-center text-gray-700 relative z-10 transition-colors duration-300 group-hover:text-deepRose px-2">${phrase.tl}</h3>
                `;
                el.addEventListener('click', () => openModal(phrase));
                grid.appendChild(el);
            });
            lucide.createIcons();
        }

        // Search Filter Logic
        function getFilteredPhrases(query) {
            const q = query.toLowerCase().trim();
            if (!q) return phrases;
            return phrases.filter(p => 
                p.tl.toLowerCase().includes(q) || 
                p.en.toLowerCase().includes(q)
            );
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            const matched = getFilteredPhrases(query);
            
            searchDropdown.innerHTML = ''; 
            
            if (query.trim() === '') {
                searchDropdown.classList.add('hidden');
                renderGrid(phrases);
                return;
            }

            if (matched.length > 0) {
                searchDropdown.classList.remove('hidden');
                matched.slice(0, 5).forEach(match => { 
                    const li = document.createElement('li');
                    li.className = 'px-4 md:px-6 py-3 md:py-4 hover:bg-softPink cursor-pointer md:cursor-none border-b border-gray-50 transition-colors flex flex-col md:flex-row justify-center md:justify-between items-start md:items-center gap-1';
                    li.innerHTML = `
                        <span class="font-bold text-deepRose text-sm md:text-base">${match.tl}</span> 
                        <span class="text-[10px] md:text-xs text-gray-400 uppercase tracking-wider">${match.en}</span>
                    `;
                    
                    li.addEventListener('click', () => {
                        searchInput.value = match.tl;
                        searchDropdown.classList.add('hidden');
                        renderGrid([match]);
                    });
                    
                    searchDropdown.appendChild(li);
                });
            } else {
                searchDropdown.classList.add('hidden');
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchDropdown.classList.add('hidden');
                const matched = getFilteredPhrases(searchInput.value);
                renderGrid(matched);
                
                anime({
                    targets: '.phrase-card',
                    scale: [0.9, 1],
                    opacity: [0, 1],
                    translateY: [20, 0],
                    delay: anime.stagger(40),
                    duration: 800,
                    easing: 'easeOutQuart'
                });
                // Unfocus the keyboard on mobile
                searchInput.blur();
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
                searchDropdown.classList.add('hidden');
            }
        });

        // Modal Logic
        function openModal(phrase) {
            document.getElementById('modal-tl').innerText = phrase.tl;
            document.getElementById('modal-en').innerText = phrase.en;
            document.getElementById('modal-p').innerText = phrase.p;
            
            overlay.style.display = 'flex';
            translationArea.style.opacity = '0';
            revealBtn.style.display = 'inline-block';
            revealBtn.style.opacity = '1';

            anime({
                targets: '#modal-card',
                translateY: [60, 0],
                opacity: [0, 1],
                duration: 800,
                easing: 'easeOutElastic(1, .8)'
            });
        }

        revealBtn.addEventListener('click', () => {
            anime({
                targets: revealBtn,
                opacity: 0,
                scale: 0.9,
                duration: 400,
                complete: () => {
                    revealBtn.style.display = 'none';
                    anime({
                        targets: translationArea,
                        opacity: 1,
                        translateY: [15, 0],
                        duration: 600,
                        easing: 'easeOutQuart'
                    });
                }
            });
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            anime({
                targets: '#modal-card',
                translateY: 20,
                scale: 0.95,
                opacity: 0,
                duration: 300,
                easing: 'easeInQuart',
                complete: () => overlay.style.display = 'none'
            });
        });

        // --- CURSOR SYSTEM ---
        const cursorMain = document.getElementById('cursor-main');
        const canvas = document.getElementById('cursor-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -100, y: -100 };
        
        // Detect if it's a touch device to stop drawing canvas hearts unnecessarily 
        const isTouchDevice = window.matchMedia("(hover: none) and (pointer: coarse)").matches;

        if (!isTouchDevice) {
            window.addEventListener('mousemove', e => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                cursorMain.style.left = mouse.x + 'px';
                cursorMain.style.top = mouse.y + 'px';
                spawnParticle();
            });

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function spawnParticle() {
                particles.push({
                    x: mouse.x,
                    y: mouse.y,
                    size: Math.random() * 6 + 4,
                    speedX: (Math.random() - 0.5) * 1.5,
                    speedY: Math.random() * 2 + 1, 
                    life: 1
                });
            }

            function drawHeart(x, y, size, opacity) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(Math.PI / 4);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size / 2, -size / 2, -size, size / 3, 0, size);
                ctx.bezierCurveTo(size, size / 3, size / 2, -size / 2, 0, 0);
                ctx.fillStyle = `rgba(255, 77, 109, ${opacity})`;
                ctx.fill();
                ctx.restore();
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    drawHeart(p.x, p.y, p.size, p.life * 0.4);
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.life -= 0.012;
                    if (p.life <= 0) particles.splice(i, 1);
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Render initially and animate
        window.addEventListener('load', () => {
            renderGrid(phrases);
            anime({
                targets: '.phrase-card',
                scale: [0.9, 1],
                opacity: [0, 1],
                translateY: [20, 0],
                delay: anime.stagger(40),
                duration: 1000,
                easing: 'easeOutQuart'
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINTA | Tagalog Phrase Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0a',
                        heartRed: '#ff0000',
                        deepRed: '#880000',
                        gold: '#d4af37',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0a0a0a;
            color: #fcfcfc;
            cursor: none !important;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- RED HEART CURSOR SYSTEM --- */
        #cursor-main {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background-color: #ff0000;
            transform: translate(-50%, -50%) rotate(45deg);
            pointer-events: none;
            z-index: 10001;
            box-shadow: 0 0 15px #ff0000;
        }
        #cursor-main::before, #cursor-main::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff0000;
            border-radius: 50%;
        }
        #cursor-main::before { left: -10px; }
        #cursor-main::after { top: -10px; }

        #cursor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10000;
        }

        /* --- GRID & CARDS --- */
        .phrase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-container {
            perspective: 1000px;
            height: 220px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            text-align: center;
            transition: border-color 0.3s;
        }

        .card-container:hover .card-face {
            border-color: rgba(255, 0, 0, 0.4);
        }

        .card-back {
            transform: rotateY(180deg);
            background: rgba(255, 0, 0, 0.05);
            border-color: rgba(255, 0, 0, 0.2);
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #ff0000; }

        #loader {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="font-sans">

    <div id="cursor-main"></div>
    <canvas id="cursor-canvas"></canvas>

    <div id="loader">
        <div class="text-center">
            <p class="font-serif italic text-heartRed tracking-[0.4em] uppercase text-[10px]">Preparing Your Phrases</p>
        </div>
    </div>

    <header class="pt-20 pb-10 text-center px-6">
        <h1 class="font-serif text-5xl md:text-6xl text-white mb-4">SINTA</h1>
        <p class="text-[10px] uppercase tracking-[0.5em] text-heartRed font-semibold">The Tagalog Phrase Library</p>
        <div class="w-12 h-[1px] bg-heartRed/40 mx-auto mt-8"></div>
    </header>

    <main class="phrase-grid" id="main-grid">
        </main>

    <footer class="py-20 text-center">
        <p class="text-[9px] uppercase tracking-[0.4em] text-white/20">Click any card to reveal its translation.</p>
    </footer>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // --- PHRASE DATA ---
        const phrases = [
            { en: "I love you", tl: "Mahal kita", p: "/Ma-hal ki-ta/" },
            { en: "I miss you", tl: "Miss na kita", p: "/Miss na ki-ta/" },
            { en: "Good morning", tl: "Magandang umaga", p: "/Ma-gan-dang u-ma-ga/" },
            { en: "You are beautiful", tl: "Ang ganda mo", p: "/Ang gan-da mo/" },
            { en: "Take care", tl: "Ingat ka", p: "/I-ngat ka/" },
            { en: "My love", tl: "Mahal ko", p: "/Ma-hal ko/" },
            { en: "Thank you", tl: "Salamat", p: "/Sa-la-mat/" },
            { en: "Let's eat", tl: "Kain na tayo", p: "/Ka-in na ta-yo/" },
            { en: "I'm sorry", tl: "Pasensya na", p: "/Pa-sen-sya na/" },
            { en: "Wait a moment", tl: "Sandali lang", p: "/San-da-li lang/" },
            { en: "Understand?", tl: "Naintindihan mo?", p: "/Na-in-tin-di-han mo/" },
            { en: "Yes", tl: "Oo", p: "/O-o/" },
            { en: "No", tl: "Hindi", p: "/Hin-di/" },
            { en: "Good night", tl: "Magandang gabi", p: "/Ma-gan-dang ga-bi/" },
            { en: "Always", tl: "Palagi", p: "/Pa-la-gi/" },
            { en: "Forever", tl: "Magpakailanman", p: "/Mag-pa-ka-i-lan-man/" }
        ];

        // --- POPULATE GRID ---
        const grid = document.getElementById('main-grid');
        phrases.forEach(phrase => {
            const card = document.createElement('div');
            card.className = 'card-container hover-target';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-face">
                        <span class="text-[8px] uppercase tracking-widest text-white/30 mb-4">English</span>
                        <h3 class="font-serif text-2xl text-white">${phrase.en}</h3>
                    </div>
                    <div class="card-face card-back">
                        <span class="text-[8px] uppercase tracking-widest text-heartRed mb-4">Tagalog</span>
                        <h3 class="font-serif text-2xl text-heartRed italic">${phrase.tl}</h3>
                        <p class="text-[9px] text-white/40 mt-4 tracking-widest">${phrase.p}</p>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => {
                card.classList.toggle('is-flipped');
            });
            grid.appendChild(card);
        });

        // --- CURSOR SYSTEM ---
        const cursorMain = document.getElementById('cursor-main');
        const canvas = document.getElementById('cursor-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -100, y: -100 };

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // Move fixed heart
            cursorMain.style.left = mouse.x + 'px';
            cursorMain.style.top = mouse.y + 'px';

            // Create falling particles
            spawnParticle();
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function spawnParticle() {
            particles.push({
                x: mouse.x,
                y: mouse.y,
                size: Math.random() * 6 + 2,
                speedX: (Math.random() - 0.5) * 2,
                speedY: Math.random() * 3 + 1, // Positive Y = Falling
                life: 1,
                opacity: 0.6
            });
        }

        function drawHeart(x, y, size, opacity) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI / 4);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size / 2, -size / 2, -size, size / 3, 0, size);
            ctx.bezierCurveTo(size, size / 3, size / 2, -size / 2, 0, 0);
            ctx.fillStyle = `rgba(255, 0, 0, ${opacity})`;
            ctx.fill();
            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                drawHeart(p.x, p.y, p.size, p.life * p.opacity);
                p.x += p.speedX;
                p.y += p.speedY; // Falling effect
                p.life -= 0.01;
                if (p.life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }
        animate();

        // --- LOADER ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            anime({
                targets: loader,
                opacity: 0,
                duration: 1000,
                easing: 'easeInOutQuad',
                complete: () => loader.style.display = 'none'
            });

            // Entrance animation for grid
            anime({
                targets: '.card-container',
                translateY: [30, 0],
                opacity: [0, 1],
                delay: anime.stagger(100),
                duration: 1000,
                easing: 'easeOutQuart'
            });
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINTA | Elegant Tagalog Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        softPink: '#fff5f7',
                        petalPink: '#ffb3c1',
                        deepRose: '#ff4d6d',
                        heartPink: '#ff758f',
                        goldBorder: 'rgba(212, 175, 55, 0.2)',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Quicksand', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;600;700&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fff5f7;
            color: #594145;
            cursor: none !important;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- PINK HEART CURSOR --- */
        #cursor-main {
            position: fixed;
            top: 0;
            left: 0;
            width: 18px;
            height: 18px;
            background-color: #ff4d6d;
            transform: translate(-50%, -50%) rotate(45deg);
            pointer-events: none;
            z-index: 10001;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.4);
        }
        #cursor-main::before, #cursor-main::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background-color: #ff4d6d;
            border-radius: 50%;
        }
        #cursor-main::before { left: -9px; }
        #cursor-main::after { top: -9px; }

        #cursor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10000;
        }

        /* --- ELEGANT PHRASE CARDS (Upgraded Shadows) --- */
        .phrase-card {
            background: linear-gradient(145deg, #ffffff, #fff0f3);
            border-radius: 32px;
            aspect-ratio: 1 / 1.1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            
            /* Beautiful Soft-UI / Neumorphic Shadow */
            box-shadow: 10px 10px 25px rgba(255, 179, 193, 0.4),
                       -10px -10px 25px rgba(255, 255, 255, 0.9);
            border: 2px solid #ffffff;
        }

        .phrase-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #ffb3c1, transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .phrase-card:hover {
            transform: translateY(-8px) scale(1.02);
            /* Deeper, warmer shadow on hover */
            box-shadow: 15px 15px 30px rgba(255, 128, 150, 0.3),
                       -12px -12px 30px rgba(255, 255, 255, 1);
        }
        
        .phrase-card:hover::after {
            opacity: 1;
        }

        /* --- MODAL POPUP (Upgraded Shadows) --- */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 245, 247, 0.6);
            backdrop-filter: blur(12px);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-content {
            background: linear-gradient(145deg, #ffffff, #fff5f7);
            width: 100%;
            max-width: 480px;
            border-radius: 50px;
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
            
            /* Lush floating shadow for the modal */
            box-shadow: 20px 20px 60px rgba(255, 128, 150, 0.25),
                       -20px -20px 60px rgba(255, 255, 255, 0.9);
            border: 4px solid #ffffff;
        }

        .btn-reveal {
            background: #ff4d6d;
            color: white;
            padding: 1.25rem 2.5rem;
            border-radius: 99px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3), inset 0 -3px 0 rgba(0,0,0,0.1);
        }

        .btn-reveal:hover {
            background: #ff758f;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 77, 109, 0.4), inset 0 -3px 0 rgba(0,0,0,0.1);
        }

        /* Animations */
        .floating {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #fff5f7; }
        ::-webkit-scrollbar-thumb { background: #ffb3c1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="cursor-main"></div>
    <canvas id="cursor-canvas"></canvas>

    <header class="pt-24 pb-12 text-center px-6">
        <div class="inline-block mb-6 floating">
            <i data-lucide="sparkles" class="text-deepRose w-6 h-6"></i>
        </div>
        <h1 class="font-serif text-5xl md:text-6xl text-deepRose mb-3 italic flex justify-center items-center gap-3">
            Sinta <span class="text-3xl opacity-80">🌸</span>
        </h1>
        <p class="font-sans font-medium text-petalPink tracking-[0.4em] uppercase text-[10px]">A Collection of Tagalog word for my Bunny</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-10 px-8 pb-32" id="phrase-grid">
    </main>

    <div id="modal-overlay">
        <div class="modal-content" id="modal-card">
            <div class="absolute -top-6 -left-6 text-6xl rotate-[-20deg] opacity-80 floating" style="animation-delay: -1s;">🐰</div>
            
            <button id="close-modal" class="absolute top-8 right-8 text-petalPink hover:text-deepRose transition-colors z-10">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            
            <div id="modal-body" class="relative z-10">
                <span class="text-[10px] uppercase tracking-[0.4em] text-petalPink mb-6 block font-bold">Tagalog Phrase</span>
                <h2 id="modal-tl" class="font-sans text-4xl md:text-5xl font-bold text-deepRose mb-4 leading-tight"></h2>
                <p id="modal-p" class="text-[11px] text-gray-500 font-medium tracking-[0.2em] mb-12"></p>
                
                <div id="translation-area" class="opacity-0">
                    <div class="w-16 h-[2px] bg-petalPink mx-auto mb-10 rounded-full"></div>
                    <span class="text-[9px] uppercase tracking-[0.4em] text-gray-400 mb-4 block font-bold">Meaning</span>
                    <h3 id="modal-en" class="font-sans text-2xl text-gray-700 font-light"></h3>
                </div>

                <div id="action-area" class="mt-12">
                    <button id="reveal-btn" class="btn-reveal">Reveal Meaning</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const phrases = [
            { tl: "Mahal kita", en: "I love you", p: "/ma-hál ki-tá/" },
            { tl: "Sinta", en: "My love", p: "/sin-tá/" },
            { tl: "Miss na kita", en: "I miss you", p: "/miss na ki-tá/" },
            { tl: "Magpakailanman", en: "Forever", p: "/mag-pa-ka-i-lan-mán/" },
            { tl: "Ikaw lang", en: "Only you", p: "/i-káw lang/" },
            { tl: "Ang ganda mo", en: "You are beautiful", p: "/ang gan-dá mo/" },
            { tl: "Akin ka", en: "You are mine", p: "/a-kín ka/" },
            { tl: "Puso ko", en: "My heart", p: "/pú-so ko/" },
            { tl: "Gusto kita", en: "I like you", p: "/gus-tó ki-tá/" },
            { tl: "Ingat ka", en: "Take care", p: "/í-ngat ka/" },
            { tl: "Palagi", en: "Always", p: "/pa-la-gi/" },
            { tl: "Tadhana", en: "Destiny", p: "/tad-ha-ná/" },
            { tl: "Magandang umaga", en: "Good morning", p: "/ma-gan-dáng u-má-ga/" },
            { tl: "Salamat", en: "Thank you", p: "/sa-lá-mat/" },
            { tl: "Pasensya na", en: "I'm sorry", p: "/pa-sén-sya na/" },
            { tl: "Oo", en: "Yes", p: "/ó-o/" },
            { tl: "Hindi", en: "No", p: "/hin-dí/" },
            { tl: "Kain tayo", en: "Let's eat", p: "/ka-ín ta-yó/" },
            { tl: "Masarap", en: "Delicious", p: "/ma-sa-ráp/" },
            { tl: "Gutom ako", en: "I am hungry", p: "/gu-tóm a-kó/" },
            { tl: "Tulog na", en: "Go to sleep", p: "/tu-lóg na/" },
            { tl: "Bahay", en: "Home", p: "/bá-hay/" },
            { tl: "Uwi na tayo", en: "Let's go home", p: "/u-wí na ta-yó/" },
            { tl: "Kumusta ka?", en: "How are you?", p: "/ku-mus-tá ka/" },
            { tl: "Mabuti", en: "Good", p: "/ma-bú-ti/" },
            { tl: "Hihintayin kita", en: "I will wait for you", p: "/hi-hin-ta-yín ki-tá/" },
            { tl: "Sandali lang", en: "Just a moment", p: "/san-da-lí lang/" },
            { tl: "Dali na", en: "Hurry up", p: "/da-lí na/" },
            { tl: "Naintindihan?", en: "Do you understand?", p: "/na-in-tin-di-hán/" },
            { tl: "Tara na", en: "Let's go", p: "/ta-rá na/" },
            { tl: "Saan tayo?", en: "Where are we going?", p: "/sa-án ta-yó/" },
            { tl: "Ano ito?", en: "What is this?", p: "/a-nó i-tó/" },
            { tl: "Gabi na", en: "It's late at night", p: "/ga-bí na/" },
            { tl: "Magandang gabi", en: "Good evening", p: "/ma-gan-dáng ga-bí/" },
            { tl: "Ngiti ka", en: "Please smile", p: "/ngi-tí ka/" },
            { tl: "Pagod ako", en: "I'm tired", p: "/pa-gód a-kó/" },
            { tl: "Masaya ako", en: "I am happy", p: "/ma-sa-yá a-kó/" },
            { tl: "Iniisp kita", en: "Thinking of you", p: "/i-ni-í-sip ki-tá/" },
            { tl: "Kwento ka", en: "Tell a story", p: "/kwén-to ka/" },
            { tl: "Aalis na", en: "Leaving now", p: "/a-a-lís na/" },
            { tl: "Bukas ulit", en: "Tomorrow again", p: "/bú-kas u-lít/" },
            { tl: "Maniwala ka", en: "Believe me", p: "/ma-ni-wa-lá ka/" },
            { tl: "Walang anuman", en: "You're welcome", p: "/wa-láng a-nu-mán/" },
            { tl: "Pakiusap", en: "Please", p: "/pa-ki-ú-sap/" },
            { tl: "Sobra", en: "Soo much/Very", p: "/só-bra/" },
            { tl: "Totoo", en: "True", p: "/to-to-ó/" },
            { tl: "Kahit kailan", en: "Whenever/Ever", p: "/ká-hit kai-lán/" },
            { tl: "Paru-paro", en: "Butterfly", p: "/pa-ru-pa-ró/" },
            { tl: "Liwanag", en: "Light", p: "/li-wa-nág/" },
            { tl: "Ulan", en: "Rain", p: "/u-lán/" },
            { tl: "Bituin", en: "Star", p: "/bi-tu-ín/" },
            { tl: "Kantotin mo ako", en: "Nice to meet you", p: "/kan-to-tin mo-a-ko/" },
            { tl: "Tuwad", en: "Bend Over", p: "/too-wad/" },
            { tl: "Sarap mo", en: "Wow", p: "/sa-rap-mo/" },
            { tl: "Bili mo ako", en: "Buy me", p: "/bi-li-mo- a-ko/" },
            { tl: "Magkano?", en: "How much?", p: "/mag-ka-no /" }
        ];

        // Cute Elements Array to sprinkle around
        const cuteIcons = ['🐰', '🌸', '🎀', '🧸', '🌷', '💕', '✨', '🍓'];

        const grid = document.getElementById('phrase-grid');
        const overlay = document.getElementById('modal-overlay');
        const revealBtn = document.getElementById('reveal-btn');
        const translationArea = document.getElementById('translation-area');

        // Populate Grid
        phrases.forEach((phrase) => {
            const randomIcon = cuteIcons[Math.floor(Math.random() * cuteIcons.length)];
            
            const el = document.createElement('div');
            el.className = 'phrase-card cursor-none group';
            el.innerHTML = `
                <div class="absolute -bottom-4 -right-2 text-6xl opacity-[0.06] transform -rotate-12 transition-all duration-500 ease-out 
                            group-hover:scale-110 group-hover:rotate-0 group-hover:opacity-[0.25] group-hover:-translate-y-2 group-hover:-translate-x-2 pointer-events-none">
                    ${randomIcon}
                </div>
                
                <span class="text-[9px] font-bold uppercase tracking-[0.3em] text-petalPink mb-3 relative z-10 transition-colors duration-300 group-hover:text-heartPink">Tagalog</span>
                <h3 class="font-sans text-2xl font-bold text-center text-gray-700 relative z-10 transition-colors duration-300 group-hover:text-deepRose">${phrase.tl}</h3>
            `;
            el.addEventListener('click', () => openModal(phrase));
            grid.appendChild(el);
        });

        function openModal(phrase) {
            document.getElementById('modal-tl').innerText = phrase.tl;
            document.getElementById('modal-en').innerText = phrase.en;
            document.getElementById('modal-p').innerText = phrase.p;
            
            overlay.style.display = 'flex';
            translationArea.style.opacity = '0';
            revealBtn.style.display = 'inline-block';
            revealBtn.style.opacity = '1';

            anime({
                targets: '#modal-card',
                translateY: [60, 0],
                opacity: [0, 1],
                duration: 800,
                easing: 'easeOutElastic(1, .8)'
            });
        }

        revealBtn.addEventListener('click', () => {
            anime({
                targets: revealBtn,
                opacity: 0,
                scale: 0.9,
                duration: 400,
                complete: () => {
                    revealBtn.style.display = 'none';
                    anime({
                        targets: translationArea,
                        opacity: 1,
                        translateY: [15, 0],
                        duration: 600,
                        easing: 'easeOutQuart'
                    });
                }
            });
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            anime({
                targets: '#modal-card',
                translateY: 20,
                scale: 0.95,
                opacity: 0,
                duration: 300,
                easing: 'easeInQuart',
                complete: () => overlay.style.display = 'none'
            });
        });

        // --- CURSOR SYSTEM ---
        const cursorMain = document.getElementById('cursor-main');
        const canvas = document.getElementById('cursor-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -100, y: -100 };

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            cursorMain.style.left = mouse.x + 'px';
            cursorMain.style.top = mouse.y + 'px';
            spawnParticle();
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function spawnParticle() {
            particles.push({
                x: mouse.x,
                y: mouse.y,
                size: Math.random() * 6 + 4,
                speedX: (Math.random() - 0.5) * 1.5,
                speedY: Math.random() * 2 + 1, 
                life: 1
            });
        }

        function drawHeart(x, y, size, opacity) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI / 4);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size / 2, -size / 2, -size, size / 3, 0, size);
            ctx.bezierCurveTo(size, size / 3, size / 2, -size / 2, 0, 0);
            ctx.fillStyle = `rgba(255, 77, 109, ${opacity})`;
            ctx.fill();
            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                drawHeart(p.x, p.y, p.size, p.life * 0.4);
                p.x += p.speedX;
                p.y += p.speedY;
                p.life -= 0.012;
                if (p.life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }
        animate();

        // Reveal entrance
        window.addEventListener('load', () => {
            anime({
                targets: '.phrase-card',
                scale: [0.9, 1],
                opacity: [0, 1],
                translateY: [20, 0],
                delay: anime.stagger(40),
                duration: 1000,
                easing: 'easeOutQuart'
            });
        });
    </script>
</body>
</html>
